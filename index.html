            }

            for (let i = floatTexts.length - 1; i >= 0; i--) { floatTexts[i].y -= 1; floatTexts[i].life--; if (floatTexts[i].life <= 0) floatTexts.splice(i, 1); }
        }

        function draw() {
            const bgHue = STAGES[selectedStageIndex].bgHue || 280;
            ctx.fillStyle = '#020205'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            if (screenShake > 0) { const shakeX = (Math.random() - 0.5) * screenShake; const shakeY = (Math.random() - 0.5) * screenShake; ctx.translate(shakeX, shakeY); screenShake *= 0.9; if (screenShake < 0.5) screenShake = 0; }

            // 確保死亡動畫期間視角也正確追蹤
            let drawWorldX = gameState === 'playing' || gameState === 'paused' || gameState === 'level_up' || gameState === 'chest' || gameState === 'dying' ? worldX : frameCount * 0.5; 
            let drawWorldY = gameState === 'playing' || gameState === 'paused' || gameState === 'level_up' || gameState === 'chest' || gameState === 'dying' ? worldY : frameCount * 0.2;

            // 繪製星空背景
            ctx.globalCompositeOperation = 'lighter';
            nebulas.forEach(nebula => { let nx = (nebula.x - drawWorldX * nebula.depth) % 4000; let ny = (nebula.y - drawWorldY * nebula.depth) % 4000; if (nx < -1000) nx += 4000; if (ny < -1000) ny += 4000; const grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nebula.radius); grad.addColorStop(0, `hsla(${bgHue}, 80%, 50%, 0.08)`); grad.addColorStop(1, `hsla(${bgHue}, 80%, 50%, 0)`); ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(nx, ny, nebula.radius, 0, Math.PI * 2); ctx.fill(); });
            ctx.globalCompositeOperation = 'source-over';
            
            // 🌟 行星動態效果更新：加入獨立漂移與自轉
            planets.forEach(planet => { 
                let driftX = planet.x + frameCount * planet.vx;
                let driftY = planet.y + frameCount * planet.vy;
                let currentRingAngle = planet.ringAngle + frameCount * planet.rotSpeed;

                let px = (driftX - drawWorldX * planet.depth) % 5000; 
                let py = (driftY - drawWorldY * planet.depth) % 5000; 
                
                // 加大緩衝區，避免巨大行星在畫面邊緣突然消失或閃爍
                if (px < -1500) px += 5000; else if (px > 3500) px -= 5000;
                if (py < -1500) py += 5000; else if (py > 3500) py -= 5000;
                
                ctx.save(); 
                ctx.translate(px, py); 
                
                // 加入微弱大氣層發光效果
                ctx.shadowBlur = 40;
                ctx.shadowColor = planet.color;

                if (planet.hasRing) { 
                    ctx.rotate(currentRingAngle); 
                    ctx.beginPath(); ctx.ellipse(0, 0, planet.radius * 2.2, planet.radius * 0.4, 0, 0, Math.PI); 
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = planet.radius * 0.15; ctx.stroke(); 
                } 
                
                const pGrad = ctx.createRadialGradient(-planet.radius*0.3, -planet.radius*0.3, 0, 0, 0, planet.radius); 
                pGrad.addColorStop(0, planet.color); pGrad.addColorStop(1, '#020617'); 
                ctx.fillStyle = pGrad; ctx.beginPath(); ctx.arc(0, 0, planet.radius, 0, Math.PI * 2); ctx.fill(); 
                
                ctx.shadowBlur = 0; // 關閉發光避免影響前景星環
                
                if (planet.hasRing) { 
                    ctx.beginPath(); ctx.ellipse(0, 0, planet.radius * 2.2, planet.radius * 0.4, 0, Math.PI, Math.PI*2); 
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = planet.radius * 0.15; ctx.stroke(); 
                } 
                ctx.restore(); 
            });

            gravityZones.forEach(gz => {
                const pos = getScreenPos(gz.x, gz.y); ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(frameCount * 0.05); 
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, gz.radius);
                grad.addColorStop(0, 'rgba(0, 0, 0, 0.9)'); grad.addColorStop(0.3, `hsla(${bgHue}, 80%, 30%, 0.6)`); 
                grad.addColorStop(0.7, `hsla(${bgHue}, 80%, 60%, 0.2)`); grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(0, 0, gz.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = `hsla(${bgHue}, 80%, 70%, 0.4)`; ctx.lineWidth = 3;
                for(let i=0; i<4; i++) { ctx.beginPath(); ctx.arc(0, 0, gz.radius * 0.5 + Math.sin(frameCount*0.05 + i)*15, i * Math.PI/2, i * Math.PI/2 + Math.PI); ctx.stroke(); }
                ctx.restore();
            });

            miniBlackHoles.forEach(mbh => {
                const pos = getScreenPos(mbh.x, mbh.y); const scale = Math.min(1, mbh.life / 20); 
                const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, mbh.radius * scale);
                grad.addColorStop(0, '#000000'); grad.addColorStop(0.3, '#3b0764'); grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(pos.x, pos.y, mbh.radius * scale, 0, Math.PI*2); ctx.fill();
            });

            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            stars.forEach(star => { let sx = (star.x - drawWorldX * star.depth) % canvas.width; let sy = (star.y - drawWorldY * star.depth) % canvas.height; if (sx < 0) sx += canvas.width; if (sy < 0) sy += canvas.height; ctx.beginPath(); ctx.arc(sx, sy, star.size, 0, Math.PI * 2); ctx.fill(); });

            // 包含 dying 狀態也繪製場景
            if (gameState === 'playing' || gameState === 'paused' || gameState === 'gameover' || gameState === 'level_up' || gameState === 'chest' || gameState === 'dying') {
                
                ctx.shadowBlur = 15; ctx.shadowColor = '#0ea5e9'; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2; ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
                destructibles.forEach(d => {
                    const pos = getScreenPos(d.x, d.y);
                    ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(frameCount * 0.02);
                    ctx.beginPath(); ctx.rect(-10, -10, 20, 20); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(-6, -6); ctx.lineTo(6, 6); ctx.moveTo(6, -6); ctx.lineTo(-6, 6); ctx.stroke(); 
                    ctx.restore();
                }); ctx.shadowBlur = 0;

                consumables.forEach(c => {
                    const pos = getScreenPos(c.x, c.y);
                    ctx.font = '24px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    if(c.type === 'heal') { ctx.shadowBlur = 10; ctx.shadowColor = '#4ade80'; ctx.fillText('🍗', pos.x, pos.y); }
                    if(c.type === 'bomb') { ctx.shadowBlur = 10; ctx.shadowColor = '#f43f5e'; ctx.fillText('💣', pos.x, pos.y); }
                    if(c.type === 'magnet') { ctx.shadowBlur = 10; ctx.shadowColor = '#38bdf8'; ctx.fillText('🧲', pos.x, pos.y); }
                    if(c.type === 'chest') { ctx.shadowBlur = 20; ctx.shadowColor = '#facc15'; ctx.fillText('📦', pos.x, pos.y + Math.sin(frameCount*0.1)*5); } 
                }); ctx.shadowBlur = 0;

                ctx.fillStyle = '#2dd4bf'; ctx.shadowBlur = 8; ctx.shadowColor = '#2dd4bf';
                gems.forEach(gem => { const pos = getScreenPos(gem.x, gem.y); if(pos.x > -10 && pos.x < canvas.width+10 && pos.y > -10 && pos.y < canvas.height+10) { ctx.beginPath(); ctx.moveTo(pos.x, pos.y - 5); ctx.lineTo(pos.x + 3, pos.y - 1); ctx.lineTo(pos.x + 7, pos.y); ctx.lineTo(pos.x + 3, pos.y + 1); ctx.lineTo(pos.x, pos.y + 5); ctx.lineTo(pos.x - 3, pos.y + 1); ctx.lineTo(pos.x - 7, pos.y); ctx.lineTo(pos.x - 3, pos.y - 1); ctx.closePath(); ctx.fill(); } });
                
                ctx.fillStyle = '#facc15'; ctx.shadowBlur = 10; ctx.shadowColor = '#eab308';
                coinsArr.forEach(c => { const pos = getScreenPos(c.x, c.y); ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ca8a04'; ctx.beginPath(); ctx.arc(pos.x, pos.y, 2, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#facc15'; });
                ctx.shadowBlur = 0;

                enemies.forEach(en => {
                    const pos = getScreenPos(en.x, en.y); ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(en.angle); 
                    if (en.damageFlash > 0) { ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#f87171'; } 
                    else { ctx.fillStyle = en.color || '#1e293b'; ctx.strokeStyle = en.type === 'elite' ? '#f87171' : (en.type === 'death' ? '#ff0000' : '#64748b'); }
                    ctx.lineWidth = en.type === 'elite' ? 3 : 2; 
                    ctx.beginPath(); en.vertices.forEach((v, idx) => { const px = Math.cos(v.a) * en.size * v.r; const py = Math.sin(v.a) * en.size * v.r; if(idx === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }); ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
                });

                if (player.weapons.aura) { 
                    let w = player.weapons.aura; let fRadius = w.baseRadius * globalAreaMult; 
                    ctx.fillStyle = w.isEvolved ? 'rgba(236, 72, 153, 0.15)' : 'rgba(217, 70, 239, 0.1)'; ctx.strokeStyle = w.isEvolved ? 'rgba(236, 72, 153, 0.4)' : 'rgba(217, 70, 239, 0.3)'; ctx.lineWidth = w.isEvolved ? 4 : 2;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, fRadius, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
                }

                particles.forEach(p => { const pos = getScreenPos(p.x, p.y); ctx.globalAlpha = p.life / p.maxLife; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI*2); ctx.fill(); }); ctx.globalAlpha = 1.0;

                bullets.forEach(b => { 
                    const pos = getScreenPos(b.x, b.y); 
                    if (b.type === 'plasma') { 
                        ctx.fillStyle = b.isEvo ? '#000000' : '#d946ef'; ctx.shadowBlur = 15; ctx.shadowColor = b.isEvo ? '#c084fc' : '#d946ef'; 
                        ctx.beginPath(); ctx.arc(pos.x, pos.y, b.isEvo ? b.aoe*0.9 : 6, 0, Math.PI*2); ctx.fill(); 
                        if(b.isEvo) { ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 3; ctx.stroke(); }
                    } else if (b.type === 'laser_evo') {
                        ctx.fillStyle = 'rgba(56, 189, 248, 0.6)'; ctx.shadowBlur = 20; ctx.shadowColor = '#38bdf8';
                        ctx.beginPath(); ctx.arc(pos.x, pos.y, b.aoe, 0, Math.PI*2); ctx.fill();
                    } else if (b.type === 'blaster') {
                        ctx.strokeStyle = b.isEvo ? '#fbbf24' : '#facc15'; ctx.lineWidth = b.isEvo ? 4 : 3; ctx.lineCap = 'round'; ctx.shadowBlur = 10; ctx.shadowColor = '#ca8a04'; 
                        ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - b.vx * 1.5, pos.y - b.vy * 1.5); ctx.stroke();
                    } else if (b.type === 'bomb') {
                        ctx.fillStyle = b.isEvo ? '#22c55e' : '#f43f5e'; ctx.beginPath(); ctx.arc(pos.x, pos.y, 8, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(pos.x-2, pos.y-2, 3, 0, Math.PI*2); ctx.fill();
                    } else { 
                        ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.shadowBlur = 10; ctx.shadowColor = '#0ea5e9'; ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - b.vx * 2, pos.y - b.vy * 2); ctx.stroke(); 
                    } 
                }); ctx.shadowBlur = 0;

                if (player.weapons.drone) { 
                    let w = player.weapons.drone; let fSpeed = w.baseSpeed * globalProjSpeedMult; let fRadius = w.baseRadius * globalAreaMult; const orbitSpeed = frameCount * fSpeed; 
                    ctx.fillStyle = w.isEvolved ? '#a78bfa' : '#facc15'; ctx.shadowBlur = 15; ctx.shadowColor = w.isEvolved ? '#8b5cf6' : '#eab308'; 
                    for(let i=0; i < w.count; i++) { 
                        const pos = getScreenPos(worldX + Math.cos(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius, worldY + Math.sin(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius); 
                        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(orbitSpeed + (Math.PI * 2 / w.count) * i); ctx.beginPath(); 
                        if(w.isEvolved) { ctx.moveTo(10, 0); ctx.lineTo(0, 6); ctx.lineTo(-10, 0); ctx.lineTo(0, -6); } else { ctx.moveTo(8, 0); ctx.lineTo(0, 5); ctx.lineTo(-8, 0); ctx.lineTo(0, -5); }
                        ctx.closePath(); ctx.fill(); ctx.restore(); 
                    } 
                    if(w.isEvolved) { ctx.strokeStyle='rgba(167, 139, 250, 0.2)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, fRadius, 0, Math.PI*2); ctx.stroke(); }
                    ctx.shadowBlur = 0; 
                }

                // 🌟 新增：只有在非死亡狀態才繪製機甲與吸取範圍
                if (gameState !== 'dying') {
                    ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(player.angle); 
                    if (player.invincibleTimer > 0 && Math.floor(frameCount / 5) % 2 === 0) ctx.globalAlpha = 0.5;
                    ctx.fillStyle = player.damageFlash > 0 ? '#ef4444' : (player.isDashing ? '#a78bfa' : '#e2e8f0'); ctx.strokeStyle = player.damageFlash > 0 ? '#fca5a5' : '#38bdf8'; 
                    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-12, 14); ctx.lineTo(-6, 0); ctx.lineTo(-12, -14); ctx.closePath(); ctx.fill(); ctx.stroke();
                    if(keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || isTouching || player.isDashing) { ctx.fillStyle = player.isDashing ? '#d946ef' : '#f97316'; ctx.beginPath(); ctx.moveTo(-7, -4); ctx.lineTo(-18 - Math.random()*(player.isDashing?15:5), 0); ctx.lineTo(-7, 4); ctx.fill(); }
                    ctx.globalAlpha = 1.0; ctx.restore(); 

                    // 畫出拾取範圍與機甲血條
                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, player.pickupRadius, 0, Math.PI*2); ctx.stroke();
                    const hpPercent = Math.max(0, player.hp / player.maxHp); ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6); ctx.fillStyle = hpPercent > 0.5 ? '#4ade80' : (hpPercent > 0.25 ? '#facc15' : '#ef4444'); ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50 * hpPercent, 6); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.strokeRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6);

                    if (isTouching && joystickOrigin && joystickCurrent && gameState === 'playing') { ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.beginPath(); ctx.arc(joystickOrigin.x, joystickOrigin.y, 40, 0, Math.PI * 2); ctx.fill(); const dist = Math.hypot(joystickCurrent.x - joystickOrigin.x, joystickCurrent.y - joystickOrigin.y); const renderX = joystickOrigin.x + (dist > 0 ? ((joystickCurrent.x - joystickOrigin.x) / dist) * Math.min(dist, 40) : 0); const renderY = joystickOrigin.y + (dist > 0 ? ((joystickCurrent.y - joystickOrigin.y) / dist) * Math.min(dist, 40) : 0); ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; ctx.beginPath(); ctx.arc(renderX, renderY, 15, 0, Math.PI * 2); ctx.fill(); }
                }

                ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; floatTexts.forEach(ft => { const pos = getScreenPos(ft.x, ft.y); ctx.globalAlpha = ft.life / 30; ctx.fillStyle = ft.color || 'white'; ctx.fillText(ft.text, pos.x, pos.y - 15); }); ctx.globalAlpha = 1.0;
            }
            ctx.restore();

            // 🌟 新增：死亡血紅全畫面淡入
            if (gameState === 'dying') {
                const fadeAlpha = Math.min(0.6, (150 - deathTimer) / 200);
                ctx.fillStyle = `rgba(159, 18, 57, ${fadeAlpha})`; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const textAlpha = Math.min(1, (150 - deathTimer) / 100);
                ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`;
                ctx.font = 'bold 48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#e11d48';
                ctx.fillText("CRITICAL DAMAGE", canvas.width/2, canvas.height/2 - 50);
                ctx.shadowBlur = 0;
            }
        }

        function gameLoop() { 
            if (gameState === 'playing' || gameState === 'dying') update(); 
            draw(); 
            requestAnimationFrame(gameLoop); 
        }
        gameLoop();
    </script>
</body>
</html>

                });
                
                ctx.fillStyle = '#facc15'; 
                coinsArr.forEach(c => { const pos = getScreenPos(c.x, c.y); ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ca8a04'; ctx.beginPath(); ctx.arc(pos.x, pos.y, 2, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#facc15'; });
                
                enemies.forEach(en => {
                    const pos = getScreenPos(en.x, en.y); 
                    if(pos.x > -100 && pos.x < canvas.width+100 && pos.y > -100 && pos.y < canvas.height+100) {
                        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(en.angle); 
                        if (en.damageFlash > 0) { ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#f87171'; } 
                        else { ctx.fillStyle = en.color || '#1e293b'; ctx.strokeStyle = en.type === 'elite' ? '#f87171' : (en.type === 'leviathan' ? '#fbbf24' : '#64748b'); }
                        ctx.lineWidth = (en.type === 'elite' || en.type === 'leviathan') ? 3 : 2; 
                        ctx.beginPath(); en.vertices.forEach((v, idx) => { const px = Math.cos(v.a) * en.size * v.r; const py = Math.sin(v.a) * en.size * v.r; if(idx === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }); ctx.closePath(); ctx.fill(); ctx.stroke(); 
                        if(en.type === 'leviathan') {
                            ctx.beginPath(); ctx.arc(0, 0, en.size*0.4, 0, Math.PI*2); ctx.fillStyle='#ef4444'; ctx.fill();
                        }
                        ctx.restore();
                    }
                });

                if (player.weapons.aura) { 
                    let w = player.weapons.aura; let fRadius = w.baseRadius * globalAreaMult; 
                    ctx.fillStyle = w.isEvolved ? 'rgba(236, 72, 153, 0.15)' : 'rgba(217, 70, 239, 0.1)'; ctx.strokeStyle = w.isEvolved ? 'rgba(236, 72, 153, 0.4)' : 'rgba(217, 70, 239, 0.3)'; ctx.lineWidth = w.isEvolved ? 4 : 2;
                    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, fRadius, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
                }

                particles.forEach(p => { const pos = getScreenPos(p.x, p.y); ctx.globalAlpha = Math.max(0, p.life / p.maxLife); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(pos.x, pos.y, Math.max(0.1, p.size), 0, Math.PI*2); ctx.fill(); }); ctx.globalAlpha = 1.0;

                // 畫無人機等軌道武器
                const orbitals = [];
                if (player.weapons.drone) { 
                    let w = player.weapons.drone; let fSpeed = w.baseSpeed * globalProjSpeedMult; let fRadius = w.baseRadius * globalAreaMult; const orbitSpeed = frameCount * fSpeed; 
                    ctx.fillStyle = w.isEvolved ? '#a78bfa' : '#facc15';
                    for(let i=0; i < w.count; i++) { 
                        const orbX = worldX + Math.cos(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius;
                        const orbY = worldY + Math.sin(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius;
                        const pos = getScreenPos(orbX, orbY); 
                        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(orbitSpeed + (Math.PI * 2 / w.count) * i); ctx.beginPath(); 
                        if(w.isEvolved) { ctx.moveTo(10, 0); ctx.lineTo(0, 6); ctx.lineTo(-10, 0); ctx.lineTo(0, -6); } else { ctx.moveTo(8, 0); ctx.lineTo(0, 5); ctx.lineTo(-8, 0); ctx.lineTo(0, -5); }
                        ctx.closePath(); ctx.fill(); ctx.restore(); 
                    } 
                    if(w.isEvolved) { ctx.strokeStyle='rgba(167, 139, 250, 0.2)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, fRadius, 0, Math.PI*2); ctx.stroke(); }
                }

                bullets.forEach(b => { 
                    const pos = getScreenPos(b.x, b.y); 
                    if (b.type === 'plasma') { 
                        ctx.fillStyle = b.isEvo ? '#000000' : '#d946ef'; 
                        ctx.beginPath(); ctx.arc(pos.x, pos.y, Math.max(0.1, b.isEvo ? b.aoe*0.9 : 6), 0, Math.PI*2); ctx.fill(); 
                        if(b.isEvo) { ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 3; ctx.stroke(); }
                    } else if (b.type === 'laser_evo') {
                        ctx.fillStyle = 'rgba(56, 189, 248, 0.6)';
                        ctx.beginPath(); ctx.arc(pos.x, pos.y, Math.max(0.1, b.aoe), 0, Math.PI*2); ctx.fill();
                    } else if (b.type === 'blaster') {
                        ctx.strokeStyle = b.isEvo ? '#fbbf24' : '#facc15'; ctx.lineWidth = b.isEvo ? 4 : 3; ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - b.vx * 1.5, pos.y - b.vy * 1.5); ctx.stroke();
                    } else if (b.type === 'bomb' || b.type === 'mine') {
                        ctx.fillStyle = b.isEvo ? '#22c55e' : (b.type === 'mine' ? '#f59e0b' : '#f43f5e'); ctx.beginPath(); ctx.arc(pos.x, pos.y, 8, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(pos.x-2, pos.y-2, 3, 0, Math.PI*2); ctx.fill();
                    } else if (b.type === 'blade') {
                        ctx.save(); ctx.translate(pos.x, pos.y); ctx.rotate(b.angle);
                        ctx.fillStyle = b.isEvo ? 'rgba(250, 204, 21, 0.8)' : 'rgba(56, 189, 248, 0.8)';
                        ctx.beginPath(); ctx.arc(0, 0, Math.max(0.1, b.aoe), -Math.PI/3, Math.PI/3); ctx.lineTo(0,0); ctx.fill();
                        ctx.restore();
                    } else { 
                        ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3; ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x - b.vx * 2, pos.y - b.vy * 2); ctx.stroke(); 
                    } 
                }); 

                if (gameState !== 'dying') {
                    // 雷達指標
                    enemies.forEach(en => { if(en.type === 'elite' || en.isBoss) drawRadarPointer(ctx, en.x, en.y, '#f87171'); });
                    consumables.forEach(c => { if(c.type === 'chest') drawRadarPointer(ctx, c.x, c.y, '#facc15'); });

                    ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2); ctx.rotate(Math.atan2(player.lastFacingY, player.lastFacingX)); 
                    if (player.invincibleTimer > 0 && Math.floor(frameCount / 5) % 2 === 0) ctx.globalAlpha = 0.5;
                    
                    drawPlayerShip(ctx, CHARACTERS[selectedCharIndex].id, player.isDashing, player.damageFlash);
                    
                    ctx.globalAlpha = 1.0; ctx.restore(); 

                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, player.pickupRadius, 0, Math.PI*2); ctx.stroke();
                    
                    // 戰機下方專屬血條繪製
                    let safeMaxHp = player.maxHp > 0 ? player.maxHp : 100;
                    let safeHp = player.hp > 0 ? player.hp : 0;
                    const hpPercent = Math.min(1, Math.max(0, safeHp / safeMaxHp)); 
                    
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; 
                    ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6); 
                    ctx.fillStyle = hpPercent > 0.5 ? '#4ade80' : (hpPercent > 0.25 ? '#facc15' : '#ef4444'); 
                    ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50 * hpPercent, 6); 
                    ctx.strokeStyle = '#1e293b'; 
                    ctx.lineWidth = 1; 
                    ctx.strokeRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6);

                    // 虛擬搖桿繪製
                    if (isTouching && joystickOrigin && joystickCurrent && gameState === 'playing') { ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.beginPath(); ctx.arc(joystickOrigin.x, joystickOrigin.y, 40, 0, Math.PI * 2); ctx.fill(); const dist = Math.hypot(joystickCurrent.x - joystickOrigin.x, joystickCurrent.y - joystickOrigin.y); const renderX = joystickOrigin.x + (dist > 0 ? ((joystickCurrent.x - joystickOrigin.x) / dist) * Math.min(dist, 40) : 0); const renderY = joystickOrigin.y + (dist > 0 ? ((joystickCurrent.y - joystickOrigin.y) / dist) * Math.min(dist, 40) : 0); ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; ctx.beginPath(); ctx.arc(renderX, renderY, 15, 0, Math.PI * 2); ctx.fill(); }
                }

                ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; floatTexts.forEach(ft => { const pos = getScreenPos(ft.x, ft.y); ctx.globalAlpha = Math.max(0, ft.life / 30); ctx.fillStyle = ft.color || 'white'; ctx.fillText(ft.text, pos.x, pos.y - 15); }); ctx.globalAlpha = 1.0;
            }
            ctx.restore();

            if (gameState === 'dying') {
                ctx.save(); ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.beginPath(); ctx.arc(0, 0, Math.max(1, deathShockwaveRadius), 0, Math.PI * 2); ctx.lineWidth = Math.max(1, 40 - deathShockwaveRadius / 25); ctx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0, 1 - deathShockwaveRadius / 1500)})`; ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, Math.max(1, deathShockwaveRadius * 0.8), 0, Math.PI * 2); ctx.fillStyle = `rgba(239, 68, 68, ${Math.max(0, 0.4 - deathShockwaveRadius / 1200)})`; ctx.fill(); ctx.restore();
                if (deathFlashAlpha > 0.01) { ctx.fillStyle = `rgba(255, 255, 255, ${deathFlashAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                const fadeAlpha = Math.max(0, Math.min(0.8, (15 - deathTimer) / 15)); ctx.fillStyle = `rgba(159, 18, 57, ${fadeAlpha})`; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                const textAlpha = Math.max(0, Math.min(1, (15 - deathTimer) / 5));
                ctx.font = '900 48px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                let glitchX = deathTimer < 12 && Math.random() < 0.5 ? (Math.random() - 0.5) * 25 : 0;
                ctx.fillStyle = `rgba(56, 189, 248, ${textAlpha * 0.7})`; ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX - 4, canvas.height/2 - 50);
                ctx.fillStyle = `rgba(244, 63, 94, ${textAlpha * 0.7})`; ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX + 4, canvas.height/2 - 50);
                ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`; ctx.shadowBlur = 20; ctx.shadowColor = '#e11d48'; ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX, canvas.height/2 - 50); ctx.shadowBlur = 0;
                ctx.font = 'bold 20px monospace'; ctx.fillStyle = `rgba(148, 163, 184, ${textAlpha})`; ctx.fillText(">> CONNECTION LOST <<", canvas.width/2 + glitchX, canvas.height/2);
                ctx.restore();
            }
        }

        function gameLoop() { 
            if (gameState === 'playing' || gameState === 'dying') update(); 
            draw(); 
            requestAnimationFrame(gameLoop); 
        }
        
        // 啟動遊戲
        gameLoop();
    </script>
</body>
</html>

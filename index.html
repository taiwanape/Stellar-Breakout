<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>星際倖存者：輓救行動 (最終進化版)</title>
    <style>
        body { margin: 0; padding: 0; background: #020205; overflow: hidden; color: #e0f2fe; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; overscroll-behavior: none; user-select: none; -webkit-user-select: none; width: 100vw; height: 100dvh; }
        canvas { display: block; width: 100%; height: 100%; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; display: flex; flex-direction: column; pointer-events: none; z-index: 5; }
        .hidden { display: none !important; }
        
        button.btn { padding: 12px 25px; font-size: 18px; background: #0ea5e9; color: white; border: 2px solid #0284c7; border-radius: 6px; cursor: pointer; margin-top: 10px; font-weight: bold; letter-spacing: 1px; transition: all 0.1s; pointer-events: auto; text-shadow: 0 1px 2px rgba(0,0,0,0.8); box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #0369a1; }
        button.btn:active { transform: translateY(4px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 0 0 #0369a1; }
        button.btn:hover { background: #38bdf8; border-color: #38bdf8; }
        button.btn.danger { background: #e11d48; border-color: #be123c; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #9f1239; }
        button.btn.danger:active { box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 0 0 #9f1239; }
        button.btn:disabled { background: #475569; border-color: #334155; box-shadow: 0 4px 0 #1e293b; transform: none; cursor: not-allowed; color: #94a3b8; }

        /* === 遊戲內 HUD === */
        .top-exp-bar { position: absolute; top: env(safe-area-inset-top, 0px); left: 0; width: 100%; height: 12px; background: rgba(0,0,0,0.8); border-bottom: 2px solid #0f172a; z-index: 10; pointer-events: none; }
        #exp-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa, #38bdf8); width: 0%; transition: width 0.2s ease-out; box-shadow: 0 0 8px #3b82f6; }
        
        .hud-container { position: absolute; top: calc(15px + env(safe-area-inset-top, 0px)); left: 0; width: 100%; display: flex; justify-content: space-between; padding-left: calc(15px + env(safe-area-inset-left, 0px)); padding-right: calc(15px + env(safe-area-inset-right, 0px)); box-sizing: border-box; pointer-events: none; z-index: 9; }
        
        /* 裝備欄 (限制 6+6) */
        .inventory-container { display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .inv-row { display: flex; gap: 4px; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); width: fit-content; }
        .weapon-slot { width: 34px; height: 34px; background: rgba(15, 23, 42, 0.85); border: 2px solid #334155; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-size: 20px; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .weapon-slot.empty { border-color: #1e293b; background: rgba(0,0,0,0.3); opacity: 0.5; }
        .weapon-slot.passive { border-radius: 50%; } 
        .weapon-slot .lvl-badge { position: absolute; bottom: -6px; right: -6px; background: #0ea5e9; color: white; font-size: 10px; font-weight: 900; padding: 1px 4px; border-radius: 4px; border: 1px solid #020205; font-family: monospace; }
        .weapon-slot.evolved { border-color: #facc15 !important; box-shadow: 0 0 10px #facc15, inset 0 0 10px rgba(250,204,21,0.3) !important; animation: pulseGlow 2s infinite; }
        
        @keyframes pulseGlow { 0% { box-shadow: 0 0 5px #facc15; } 50% { box-shadow: 0 0 15px #fbbf24; } 100% { box-shadow: 0 0 5px #facc15; } }

        /* 正上方：時間 */
        .timer-container { text-align: center; pointer-events: auto; }
        .time-display { font-size: 32px; color: #f8fafc; text-shadow: 0 0 10px #38bdf8, 2px 2px 0px #000; font-family: monospace; font-weight: bold; letter-spacing: 2px; }
        .earth-time { font-size: 14px; color: #fca5a5; text-shadow: 1px 1px 0px #000; margin-top: -5px; font-weight: bold; }

        /* 右上角：數值 */
        .stats-container { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 0px #000; font-family: monospace; }
        .stat-item { background: rgba(15,23,42,0.7); padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); min-width: 100px; text-align: right; }
        
        #pause-btn-ingame { background: rgba(15, 23, 42, 0.8); border: 2px solid #0ea5e9; color: #38bdf8; font-size: 18px; border-radius: 6px; padding: 6px 12px; cursor: pointer; pointer-events: auto; margin-top: 5px; font-weight: bold; box-shadow: 0 2px 0 #0284c7; transition: 0.1s;}
        #pause-btn-ingame:active { transform: translateY(2px); box-shadow: 0 0 0 #0284c7; }
        
        #dash-btn { position: absolute; bottom: calc(30px + env(safe-area-inset-bottom, 0px)); right: calc(30px + env(safe-area-inset-right, 0px)); background: rgba(139, 92, 246, 0.6); border: 2px solid #a78bfa; color: white; font-size: 16px; font-weight: bold; border-radius: 50%; width: 80px; height: 80px; cursor: pointer; pointer-events: auto; display: flex; justify-content: center; align-items: center; transition: all 0.2s; box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); z-index: 10;}
        #dash-btn:active { background: #8b5cf6; transform: scale(0.9); }
        #dash-btn.cooldown { background: rgba(71, 85, 105, 0.6); border-color: #64748b; color: #94a3b8; box-shadow: none; }

        /* === 模態視窗 === */
        .modal { position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(2, 2, 5, 0.95); pointer-events: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px); box-sizing: border-box; }
        .menu-box { background: #0f172a; padding: 30px; border-radius: 12px; border: 2px solid #334155; width: 90%; max-width: 800px; max-height: calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 40px); overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); position: relative; margin: auto; box-sizing: border-box; }
        
        h1.sys-title { font-size: 36px; margin: 0 0 10px 0; color: #e2e8f0; text-align: center; text-transform: uppercase; letter-spacing: 3px; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .coin-display { font-size: 20px; color: #facc15; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 15px; }
        
        /* 標題畫面與封面 */
        .title-cover {
            background-color: rgba(2, 2, 5, 0.85);
            backdrop-filter: blur(4px);
        }
        .mega-title { font-size: 64px; color: #38bdf8; text-shadow: 0 0 30px #0ea5e9, 0 0 60px #0284c7; letter-spacing: 8px; font-weight: 900; text-align: center; margin-top: 10vh; margin-bottom: 0; }
        .sub-title { font-size: 20px; color: #a78bfa; letter-spacing: 6px; text-align: center; margin-top: 5px; margin-bottom: 10vh; }
        
        .menu-list { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; margin: 0 auto; }
        .menu-list button { width: 100%; padding: 15px; font-size: 20px; }

        /* 選角與關卡 */
        .select-layout { display: flex; flex-direction: row; gap: 20px; height: 45vh; min-height: 250px; }
        .side-panel { width: 250px; background: #1e293b; padding: 15px; border-radius: 8px; border: 1px solid #475569; overflow-y: auto; font-size: 14px; text-align: left; }
        .main-panel { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; align-content: start; overflow-y: auto; padding-right: 5px; }
        .main-panel.list { display: flex; flex-direction: column; }
        
        .char-slot { background: #0f172a; border: 2px solid #334155; border-radius: 8px; aspect-ratio: 1; display: flex; justify-content: center; align-items: center; font-size: 32px; cursor: pointer; transition: 0.2s; }
        .char-slot:hover { border-color: #94a3b8; transform: scale(1.05); }
        .char-slot.selected { border-color: #facc15; box-shadow: 0 0 15px rgba(250,204,21,0.5); background: #1e293b; }
        
        .stage-slot { background: #1e293b; border: 2px solid #334155; padding: 15px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; }
        .stage-slot:hover { border-color: #94a3b8; }
        .stage-slot.selected { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56,189,248,0.5); background: #0ea5e9; color: #020205; }
        .stage-slot h3 { margin: 0; font-size: 18px; }
        .stage-slot p { margin: 0; font-size: 12px; opacity: 0.8; }

        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 5px 0; }
        .stat-row span:last-child { color: #38bdf8; font-weight: bold; }
        .start-weapon-badge { font-size: 12px; background: #334155; padding: 3px 8px; border-radius: 4px; color: #e2e8f0; display: inline-block; margin-top:5px;}

        /* 升級選單 */
        .upgrade-cards { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; align-items: center; }
        .card { background: #1e293b; border: 2px solid #334155; border-radius: 8px; padding: 15px; width: 100%; max-width: 450px; cursor: pointer; transition: all 0.1s; text-align: left; display: flex; align-items: center; gap: 15px; box-sizing: border-box; }
        .card:hover { border-color: #38bdf8; background: #0ea5e9; color: #0f172a; transform: translateX(5px); }
        .card:active { transform: translateX(5px) scale(0.98); }
        .card:hover h3, .card:hover p, .card:hover .tag { color: #0f172a; }
        .card-icon { font-size: 36px; width: 50px; text-align: center; }
        .card-content { flex: 1; }
        .card h3 { margin: 0 0 5px 0; color: #38bdf8; font-size: 18px; font-weight: 900; display: flex; justify-content: space-between; align-items: center;}
        .card p { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.4; }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: rgba(56,189,248,0.2); color: #38bdf8; font-weight: bold; }
        .tag.new { background: rgba(250,204,21,0.2); color: #facc15; }
        .tag.evo-tag { background: rgba(236,72,153,0.3); color: #fbcfe8; }

        /* 寶箱開箱專屬介面 */
        #chest-modal { background: rgba(0,0,0,0.95); z-index: 30; }
        .chest-container { text-align: center; animation: dropIn 0.5s ease-out; }
        @keyframes dropIn { 0% { transform: translateY(-200px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        .chest-img { font-size: 120px; text-shadow: 0 0 50px rgba(250,204,21,0.8); cursor: pointer; transition: 0.2s; display: inline-block; }
        .chest-img:hover { transform: scale(1.1); text-shadow: 0 0 80px rgba(250,204,21,1); }
        .chest-img.opening { animation: shake 0.5s infinite; pointer-events: none; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-3px, 0px) rotate(5deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 60% { transform: translate(-3px, 1px) rotate(-5deg); } 80% { transform: translate(-1px, -1px) rotate(2deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        
        .chest-reward { display: none; margin-top: 30px; animation: popUp 0.5s ease-out forwards; }
        @keyframes popUp { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .reward-box { background: linear-gradient(135deg, #1e293b, #0f172a); border: 3px solid #facc15; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 30px rgba(250,204,21,0.5); }
        .reward-box h2 { color: #facc15; margin: 0 0 10px 0; font-size: 28px; }
        .reward-box p { color: #e2e8f0; font-size: 16px; margin: 0; }

        /* 商店 */
        .shop-items { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-height: 45vh; overflow-y: auto; padding-right: 10px; }
        .shop-item { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 15px; text-align: left; }
        .shop-item h3 { margin: 0 0 5px 0; color: #2dd4bf; font-size: 16px; }

        /* 閃爍文字 */
        .blinking-text { font-size: 18px; color: #e2e8f0; animation: blink 1.5s infinite; letter-spacing: 2px; text-align: center; text-shadow: 0 0 10px #ffffff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 終端機硬重啟 (CRT開啟)特效 */
        @keyframes terminalBoot {
            0% { transform: scaleY(0.01) scaleX(0); filter: brightness(300%) contrast(200%); }
            40% { transform: scaleY(0.01) scaleX(1); filter: brightness(300%) contrast(200%); }
            100% { transform: scaleY(1) scaleX(1); filter: brightness(100%) contrast(100%); }
        }
        #game-over-modal:not(.hidden) { 
            animation: terminalBoot 0.45s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; 
            transform-origin: center; 
            opacity: 1 !important; 
        }

        @media (max-width: 1024px) {
            .mega-title { font-size: 56px; letter-spacing: 6px; }
            h1.sys-title { font-size: 28px; }
            .time-display { font-size: 24px; }
        }

        @media (max-width: 768px) {
            .select-layout { flex-direction: column; height: auto; min-height: 0; }
            .side-panel { width: 100%; max-height: 180px; box-sizing: border-box;}
            .menu-box { padding: 20px 15px; width: 95%; border-radius: 8px; }
            .mega-title { font-size: 42px; letter-spacing: 3px; margin-top: 5vh; }
            
            .hud-container { padding-left: calc(5px + env(safe-area-inset-left, 0px)); padding-right: calc(5px + env(safe-area-inset-right, 0px)); }
            .time-display { font-size: 24px; }
            .stats-container { font-size: 14px; }
            .stat-item { min-width: 80px; padding: 2px 6px; }
            
            .inventory-container { gap: 2px; }
            .inv-row { gap: 2px; padding: 2px; }
            .weapon-slot { width: 26px; height: 26px; font-size: 14px; border-width: 1px; }
            .weapon-slot .lvl-badge { font-size: 8px; padding: 1px 2px; bottom: -3px; right: -3px; }
            
            #dash-btn { width: 65px; height: 65px; font-size: 14px; bottom: calc(20px + env(safe-area-inset-bottom, 0px)); right: calc(20px + env(safe-area-inset-right, 0px)); }
            #pause-btn-ingame { font-size: 14px; padding: 4px 8px; }
            
            .card { padding: 10px; }
            .card-icon { font-size: 28px; width: 40px; }
            .card h3 { font-size: 16px; }
            .chest-img { font-size: 80px; }
        }
    </style>
</head>
<body>

    <!-- 遊戲中 HUD -->
    <div id="game-ui" class="overlay hidden">
        <div class="top-exp-bar"><div id="exp-fill"></div></div>
        
        <div class="hud-container">
            <div class="inventory-container" id="inventory-container">
                <div id="weapon-row" class="inv-row"></div>
                <div id="passive-row" class="inv-row"></div>
            </div>
            
            <div class="timer-container">
                <div class="time-display" id="time-display">00:00</div>
                <div class="earth-time">地球：西元 <span id="earth-year">2084</span></div>
            </div>
            
            <div class="stats-container">
                <div class="stat-item">LV <span id="level-display">1</span></div>
                <div class="stat-item">🪙 <span id="ingame-coin-display" style="color:#facc15">0</span></div>
                <div class="stat-item">💀 <span id="score-display" style="color:#f87171">0</span></div>
                <button id="pause-btn-ingame" onclick="togglePause()">⏸ 選單</button>
            </div>
        </div>
        
        <button id="dash-btn" onclick="triggerDash()">空間<br>摺疊</button>
    </div>

    <!-- 標題畫面與封面 -->
    <div id="title-screen" class="modal title-cover" onclick="enterMenu()" style="cursor: pointer; z-index: 30;">
        <div class="title-container" style="text-align: center; margin-top: 15vh;">
            <h1 class="mega-title" style="margin-top: 0; text-shadow: 0 0 40px #0ea5e9, 0 0 80px #0284c7;">星際倖存者</h1>
            <h2 class="sub-title" style="font-weight: bold; background: linear-gradient(90deg, #a78bfa, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Project Salvation</h2>
            <p class="blinking-text" style="margin-top: 80px;">- 點擊螢幕任意處進入系統 -</p>
        </div>
        <div style="position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 30px); font-size: 14px; color: #94a3b8; letter-spacing: 3px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
            CREATED BY 林小木
        </div>
        <div style="position: absolute; bottom: env(safe-area-inset-bottom, 20px); font-size: 12px; color: #475569; letter-spacing: 2px;">
            VER 1.5.0 | HORDE AWAKENING
        </div>
    </div>

    <!-- 主選單 -->
    <div id="main-menu" class="modal hidden">
        <h1 class="mega-title" style="font-size: 48px; margin-top: 5vh;">星際倖存者</h1>
        <h2 class="sub-title" style="font-size: 16px; margin-bottom: 40px;">Project Salvation</h2>
        
        <div class="menu-list">
            <button class="btn" onclick="goToCharSelect()" style="background:#22c55e; border-color:#16a34a; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #15803d;">開始遊戲 (Start)</button>
            <button class="btn" onclick="goToShop()" style="background:#8b5cf6; border-color:#7c3aed; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #6d28d9;">強化道具 (PowerUps)</button>
            <button class="btn" disabled>圖鑑收藏 (Collection)</button>
        </div>
        <div style="margin-top: 30px; font-size: 16px; color: #cbd5e1; font-weight:bold;">資料幣: <span id="menu-coins" style="color:#facc15;">0</span></div>
    </div>

    <!-- 角色選擇選單 -->
    <div id="char-select-menu" class="modal hidden">
        <div class="menu-box">
            <h1 class="sys-title">角色選擇</h1>
            <div class="select-layout">
                <div class="side-panel" id="char-stats"></div>
                <div class="main-panel" id="char-grid"></div>
            </div>
            <div style="background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #475569; text-align: left;">
                <h3 id="char-name" style="margin: 0 0 10px 0; color: #facc15; font-size: 18px;">漫遊者號</h3>
                <span class="start-weapon-badge" id="char-weapon">初始武裝: 前鋒機砲</span>
                <p id="char-desc" style="margin:10px 0 0 0; font-size: 14px; color:#cbd5e1;"></p>
            </div>
            <div style="display:flex; justify-content: space-between; margin-top: 15px;">
                <button class="btn danger" onclick="backToMainMenu()">返回</button>
                <button class="btn" onclick="goToStageSelect()" style="background:#22c55e; border-color:#16a34a; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #15803d;">確認</button>
            </div>
        </div>
    </div>

    <!-- 關卡選擇選單 -->
    <div id="stage-select-menu" class="modal hidden">
        <div class="menu-box">
            <h1 class="sys-title">關卡選擇</h1>
            <div class="select-layout">
                <div class="main-panel list" id="stage-list"></div>
                <div class="side-panel" id="stage-details"></div>
            </div>
            <div style="display:flex; justify-content: space-between; margin-top: 15px;">
                <button class="btn danger" onclick="goToCharSelect()">返回</button>
                <button class="btn" onclick="startGame()" style="background:#22c55e; border-color:#16a34a; box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 4px 0 #15803d;">開始遊玩</button>
            </div>
        </div>
    </div>

    <!-- 商店選單 -->
    <div id="shop-menu" class="modal hidden">
        <div class="menu-box">
            <h1 class="sys-title">強化道具</h1>
            <div class="coin-display">持有金幣: <span id="shop-coins">0</span></div>
            <div class="shop-items" id="shop-items-container"></div>
            <button class="btn danger" onclick="backToMainMenu()" style="width:100%;">完成</button>
        </div>
    </div>

    <!-- 升級彈窗 -->
    <div id="level-up-modal" class="modal hidden">
        <div class="menu-box" style="text-align:center; max-width: 600px;">
            <h1 id="level-up-title" class="sys-title" style="color: #38bdf8; border-bottom:none; margin-bottom: 0;">等級提升！</h1>
            <div class="upgrade-cards" id="upgrade-options"></div>
        </div>
    </div>

    <!-- 寶箱開啟畫面 -->
    <div id="chest-modal" class="modal hidden">
        <div class="chest-container">
            <h1 style="color: #facc15; letter-spacing: 4px; font-size: 32px; text-shadow: 0 0 20px #ca8a04;">發現寶藏！</h1>
            <div id="chest-box" class="chest-img" onclick="openChest()">📦</div>
            
            <div id="chest-reward-ui" class="chest-reward">
                <div class="reward-box" id="chest-item-box"></div>
                <div style="color: #facc15; font-size: 28px; font-weight: bold; font-family: monospace; margin-bottom: 20px;">
                    💰 +<span id="chest-coins">0</span> 幣
                </div>
                <button class="btn" onclick="closeChest()" style="background:#22c55e; border-color:#16a34a; width: 200px;">完成</button>
            </div>
        </div>
    </div>

    <!-- 暫停選單 -->
    <div id="pause-modal" class="modal hidden">
        <div class="menu-box" style="text-align:center; max-width: 450px;">
            <h1 class="sys-title">遊戲暫停</h1>
            
            <div style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155;">
                <div style="text-align: left; margin-bottom: 8px; color:#cbd5e1; font-size: 14px; font-weight: bold;">已取得裝備 (最多 6+6)：</div>
                <div class="inventory-container" style="align-items: center;">
                    <div id="pause-weapon-row" class="inv-row"></div>
                    <div id="pause-passive-row" class="inv-row"></div>
                </div>
            </div>

            <div style="display:flex; flex-direction: column; gap:15px;">
                <button class="btn" onclick="resumeFromPause()" style="padding: 15px;">繼續遊戲</button>
                <button class="btn danger" onclick="quitToMenu()">放棄並結算</button>
            </div>
        </div>
    </div>

    <!-- 結束彈窗 -->
    <div id="game-over-modal" class="modal hidden">
        <div class="menu-box" style="text-align:center; max-width: 400px;">
            <h1 id="game-over-title" class="sys-title" style="color: #e11d48; border-color: #9f1239;">遊戲結束</h1>
            <p style="font-size: 18px;">最終等級: <span id="final-level" style="color:#38bdf8; font-weight:bold;"></span></p>
            <p style="font-size: 18px;">存活時間: <span id="final-time" style="color:#f87171; font-weight:bold;"></span></p>
            <p style="font-size: 18px;">擊敗敵人: <span id="final-score" style="font-weight:bold;"></span></p>
            <div style="background:#1e293b; padding:15px; border-radius:8px; margin: 20px 0; border: 2px solid #facc15;">
                <p style="color:#facc15; font-size: 24px; font-weight: bold; margin: 0;">
                    獲得金幣: +<span id="final-coins"></span>
                </p>
            </div>
            <button class="btn" onclick="backToMainMenu()" style="width:100%; padding: 15px;">返回主畫面</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const dashBtn = document.getElementById('dash-btn');
        const mainMenu = document.getElementById('main-menu');
        const shopMenu = document.getElementById('shop-menu');
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        let saveData = JSON.parse(localStorage.getItem('spaceSurvivorsSave_v15')) || { coins: 0, upgrades: { hp: 0, speed: 0, damage: 0, magnet: 0 } };
        function saveGame() { localStorage.setItem('spaceSurvivorsSave_v15', JSON.stringify(saveData)); updateMenuCoins(); }

        let gameState = 'title';
        let worldX = 0, worldY = 0, score = 0, frameCount = 0, gameSeconds = 0, collectedCoins = 0;
        let enemies = [], bullets = [], gems = [], coinsArr = [], floatTexts = [], particles = [];
        let miniBlackHoles = [], destructibles = [], consumables = []; // 🌟 移除了 gravityZones (原本的黑圈圈)
        
        let player = { 
            size: 16, hp: 0, maxHp: 0, exp: 0, maxExp: 5, level: 1, 
            angle: -Math.PI/2, lastFacingX: 1, lastFacingY: 0, 
            damageFlash: 0, weapons: {}, passives: {}, dashCd: 0, isDashing: false, dashTimer: 0, invincibleTimer: 0 
        };
        
        let bossSpawned = false, currentBoss = null, warningTimer = 0;
        let screenShake = 0, deathTimer = 0, deathShockwaveRadius = 0, deathFlashAlpha = 0;
        let globalDmgMult = 1, globalCdMult = 1, globalProjSpeedMult = 1, globalAreaMult = 1;

        const MAX_WEAPONS = 6;
        const MAX_PASSIVES = 6;

        // --- 武器與被動資料 ---
        const WEAPON_DB = {
            blaster: { name: '前鋒機砲', icon: '🔫', maxLevel: 8, evoReq: 'cooldown', evoName: '裂空者', evoIcon: '🌠', desc: ['朝面朝方向發射彈道', '額外發射1個投射物', '基礎傷害提高', '額外發射1個投射物', '基礎傷害提高', '投射物速度加快', '可穿透敵人', '冷卻時間極大幅縮短'] },
            laser: { name: '脈衝雷射', icon: '⚡', maxLevel: 8, evoReq: 'damage', evoName: '天罰陣列', evoIcon: '🛰️', desc: ['自動鎖定最近的敵人', '基礎傷害提高', '冷卻時間縮短', '基礎傷害提高', '投射物速度加快', '冷卻時間縮短', '基礎傷害提高', '無冷卻機關槍'] },
            drone: { name: '護衛無人機', icon: '🛸', maxLevel: 8, evoReq: 'proj_speed', evoName: '星塵結界', evoIcon: '💫', desc: ['環繞在角色周圍', '基礎傷害提高', '額外增加1台', '基礎速度提高', '效果範圍擴大', '額外增加1台', '基礎傷害提高', '進化為高速防禦網'] },
            plasma: { name: '電漿爆破', icon: '🔮', maxLevel: 8, evoReq: 'area', evoName: '超新星', evoIcon: '🌌', desc: ['隨機發射爆炸球', '效果範圍擴大', '額外發射1個', '基礎傷害提高', '冷卻時間縮短', '額外發射2個', '效果範圍擴大', '進化為全畫面黑洞'] },
            aura: { name: '輻射力場', icon: '🌀', maxLevel: 8, evoReq: 'magnet', evoName: '絕對領域', evoIcon: '💠', desc: ['對身邊敵人造成持續傷害', '效果範圍擴大', '傷害頻率加快', '基礎傷害提高', '效果範圍擴大', '傷害頻率加快', '基礎傷害提高', '極速高傷領域'] },
            bomb: { name: '櫻桃炸彈', icon: '🍒', maxLevel: 8, evoReq: 'hp', evoName: '核聚變彈', evoIcon: '☢️', desc: ['投擲會爆炸的炸彈', '爆炸範圍擴大', '冷卻時間縮短', '額外投擲1個', '基礎傷害提高', '爆炸範圍擴大', '額外投擲1個', '引發毀滅性核爆'] }
        };

        const PASSIVE_DB = {
            cooldown: { name: '冷卻核心', icon: '❄️', maxLevel: 5, desc: '武器的冷卻時間縮短 8%。' },
            damage: { name: '高能晶片', icon: '🔥', maxLevel: 5, desc: '造成的傷害提高 10%。' },
            proj_speed: { name: '超導軌道', icon: '🛤️', maxLevel: 5, desc: '投射物飛行速度加快 10%。' },
            area: { name: '廣域雷達', icon: '📡', maxLevel: 5, desc: '效果範圍擴大 10%。' },
            magnet: { name: '重力牽引網', icon: '🧲', maxLevel: 5, desc: '拾取範圍擴大 25%。' },
            hp: { name: '裝甲塗層', icon: '🛡️', maxLevel: 5, desc: '最大生命值提高 20%。' }
        };

        const CHARACTERS = [
            { id: 'ranger', name: '漫遊者', icon: '👨‍🚀', hp: 100, speed: 4.0, damage: 1.0, weapon: 'blaster', desc: '標準機體。每升 10 級額外提升 10% 傷害。' },
            { id: 'heavy', name: '守衛者', icon: '🤖', hp: 180, speed: 3.0, damage: 0.8, weapon: 'drone', desc: '重裝甲。最大生命值極高，但移動緩慢。' },
            { id: 'scout', name: '疾風先鋒', icon: '👽', hp: 70, speed: 5.5, damage: 0.9, weapon: 'laser', desc: '極高機動性。' }
        ];

        const STAGES = [
            { id: 'gargantua', name: '卡岡都亞星際', desc: '純粹的深空戰場。<br><b>難度：★☆☆</b>', locked: false, bgHue: 280 },
            { id: 'dyson', name: '廢棄戴森球', desc: '金屬迷宮。<br><b>難度：★★☆</b> (開發中)', locked: true, bgHue: 200 }
        ];

        const shopConfig = {
            hp: { name: '裝甲', desc: '受到的傷害減少 1 點。', baseCost: 50, maxLevel: 5 },
            speed: { name: '推進器', desc: '角色的移動速度提高 5%。', baseCost: 80, maxLevel: 5 },
            damage: { name: '火控晶片', desc: '基礎傷害提高 5%。', baseCost: 100, maxLevel: 5 },
            magnet: { name: '磁鐵', desc: '拾取範圍擴大 10%。', baseCost: 60, maxLevel: 5 }
        };

        let selectedCharIndex = 0;
        let selectedStageIndex = 0;

        function hideAllModals() { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); document.getElementById('game-ui').classList.add('hidden'); }
        function enterMenu() { document.getElementById('title-screen').classList.add('hidden'); mainMenu.classList.remove('hidden'); gameState = 'menu'; }
        function backToMainMenu() { hideAllModals(); mainMenu.classList.remove('hidden'); gameState = 'menu'; updateMenuCoins(); }
        function goToShop() { hideAllModals(); shopMenu.classList.remove('hidden'); gameState = 'shop'; renderShop(); }
        function goToCharSelect() { hideAllModals(); document.getElementById('char-select-menu').classList.remove('hidden'); gameState = 'char_select'; renderCharSelect(); }
        function goToStageSelect() { hideAllModals(); document.getElementById('stage-select-menu').classList.remove('hidden'); gameState = 'stage_select'; renderStageSelect(); }

        function updateMenuCoins() { 
            document.getElementById('menu-coins').innerText = saveData.coins; 
            document.getElementById('shop-coins').innerText = saveData.coins; 
            document.getElementById('ingame-coin-display').innerText = collectedCoins; 
        }

        function renderCharSelect() {
            const grid = document.getElementById('char-grid'); grid.innerHTML = '';
            CHARACTERS.forEach((char, index) => {
                const slot = document.createElement('div'); slot.className = `char-slot ${index === selectedCharIndex ? 'selected' : ''}`;
                slot.innerText = char.icon; slot.onclick = () => { selectedCharIndex = index; renderCharSelect(); }; grid.appendChild(slot);
            });
            const char = CHARACTERS[selectedCharIndex];
            document.getElementById('char-name').innerHTML = `${char.name}`;
            document.getElementById('char-weapon').innerText = `初始武裝: ${WEAPON_DB[char.weapon].name}`;
            document.getElementById('char-desc').innerText = char.desc;
            
            const hpBonus = (saveData.upgrades.hp || 0) * 10; const speedBonus = (saveData.upgrades.speed || 0) * 5;
            const dmgBonus = (saveData.upgrades.damage || 0) * 5; const magBonus = (saveData.upgrades.magnet || 0) * 10;
            document.getElementById('char-stats').innerHTML = `
                <div style="color:#facc15; margin-bottom:10px; font-weight:bold; border-bottom:1px solid #475569; padding-bottom:5px;">基礎能力</div>
                <div class="stat-row"><span>最大生命</span><span>${char.hp} <span style="color:#4ade80">+${hpBonus}</span></span></div>
                <div class="stat-row"><span>移動速度</span><span>${char.speed.toFixed(1)} <span style="color:#4ade80">+${speedBonus}%</span></span></div>
                <div class="stat-row"><span>力量</span><span>+${Math.round((char.damage-1)*100)}% <span style="color:#4ade80">+${dmgBonus}%</span></span></div>
                <div class="stat-row"><span>拾取範圍</span><span>100 <span style="color:#4ade80">+${magBonus}%</span></span></div>
            `;
        }

        function renderStageSelect() {
            const list = document.getElementById('stage-list'); list.innerHTML = '';
            STAGES.forEach((stage, index) => {
                const slot = document.createElement('div'); slot.className = `stage-slot ${index === selectedStageIndex ? 'selected' : ''} ${stage.locked ? 'locked' : ''}`;
                slot.innerHTML = `<h3>${stage.name}</h3><p>${stage.locked ? '🔒 未解鎖' : '可用'}</p>`;
                if (!stage.locked) { slot.onclick = () => { selectedStageIndex = index; renderStageSelect(); }; } else { slot.style.opacity = '0.5'; slot.style.cursor = 'not-allowed'; }
                list.appendChild(slot);
            });
            const stage = STAGES[selectedStageIndex];
            document.getElementById('stage-details').innerHTML = `<h3 style="color:#38bdf8; margin:0 0 10px 0;">${stage.name}</h3><p style="font-size:14px; color:#cbd5e1; line-height:1.5;">${stage.desc}</p>`;
        }

        function renderShop() {
            const container = document.getElementById('shop-items-container'); container.innerHTML = '';
            for (let key in shopConfig) {
                const item = shopConfig[key]; const currentLevel = saveData.upgrades[key] || 0;
                const cost = item.baseCost * (currentLevel + 1); const isMax = currentLevel >= item.maxLevel;
                const div = document.createElement('div'); div.className = 'shop-item';
                div.innerHTML = `<h3>${item.name} <span style="color:#94a3b8; font-size:12px;">(Lv.${currentLevel}/${item.maxLevel})</span></h3><p>${item.desc}</p>
                    <button class="btn shop-buy-btn" ${isMax || saveData.coins < cost ? 'disabled' : ''} onclick="buyUpgrade('${key}', ${cost})">${isMax ? '滿級' : `💰 ${cost}`}</button>`;
                container.appendChild(div);
            }
        }
        function buyUpgrade(key, cost) { if (saveData.coins >= cost) { saveData.coins -= cost; saveData.upgrades[key] = (saveData.upgrades[key] || 0) + 1; saveGame(); renderShop(); } }

        function calcStats() {
            const char = CHARACTERS[selectedCharIndex];
            globalDmgMult = char.damage + (saveData.upgrades.damage || 0) * 0.05; 
            globalCdMult = 1.0; globalProjSpeedMult = 1.0; globalAreaMult = 1.0;
            
            if (player.passives.damage) globalDmgMult += player.passives.damage.level * 0.10;
            if (player.passives.cooldown) globalCdMult -= player.passives.cooldown.level * 0.08;
            if (player.passives.proj_speed) globalProjSpeedMult += player.passives.proj_speed.level * 0.10;
            if (player.passives.area) globalAreaMult += player.passives.area.level * 0.10;
            
            let magnetBase = 100 * (1 + (saveData.upgrades.magnet || 0) * 0.1);
            if (player.passives.magnet) magnetBase *= (1 + player.passives.magnet.level * 0.25);
            player.pickupRadius = magnetBase; 
            
            globalCdMult = Math.max(0.1, globalCdMult); 
            if (char.id === 'ranger') globalDmgMult += Math.floor(player.level / 10) * 0.1;
        }

        function updateInventoryUI() {
            const updateRow = (wRowId, pRowId) => {
                const wRow = document.getElementById(wRowId); if(!wRow) return; wRow.innerHTML = '';
                for(let i=0; i<MAX_WEAPONS; i++) {
                    const keys = Object.keys(player.weapons); const slot = document.createElement('div');
                    if (i < keys.length) {
                        const id = keys[i]; const w = player.weapons[id];
                        slot.className = w.isEvolved ? 'weapon-slot evolved' : 'weapon-slot';
                        let icon = w.isEvolved ? WEAPON_DB[id].evoIcon : WEAPON_DB[id].icon;
                        slot.innerHTML = `${icon}<div class="lvl-badge">${w.isEvolved ? 'MAX' : `${w.level}`}</div>`;
                    } else { slot.className = 'weapon-slot empty'; }
                    wRow.appendChild(slot);
                }
                const pRow = document.getElementById(pRowId); if(!pRow) return; pRow.innerHTML = '';
                for(let i=0; i<MAX_PASSIVES; i++) {
                    const keys = Object.keys(player.passives); const slot = document.createElement('div');
                    if (i < keys.length) {
                        const id = keys[i]; const p = player.passives[id];
                        slot.className = 'weapon-slot passive'; slot.innerHTML = `${PASSIVE_DB[id].icon}<div class="lvl-badge">${p.level}</div>`;
                    } else { slot.className = 'weapon-slot passive empty'; }
                    pRow.appendChild(slot);
                }
            };
            updateRow('weapon-row', 'passive-row'); updateRow('pause-weapon-row', 'pause-passive-row');
        }

        // 🌟 武器數值大調：初期冷卻時間大幅下降
        function acquireWeapon(id) {
            if(id === 'blaster') player.weapons.blaster = { level: 1, baseDamage: 10, baseCooldown: 30, baseSpeed: 15, count: 1, timer: 0, isEvolved: false };
            if(id === 'laser') player.weapons.laser = { level: 1, baseDamage: 8, baseCooldown: 40, baseSpeed: 18, timer: 0, isEvolved: false };
            if(id === 'drone') player.weapons.drone = { level: 1, baseDamage: 5, count: 2, baseRadius: 80, baseSpeed: 0.08, isEvolved: false };
            if(id === 'plasma') player.weapons.plasma = { level: 1, baseDamage: 15, baseCooldown: 60, baseSpeed: 6, count: 3, baseAoe: 60, timer: 0, isEvolved: false };
            if(id === 'aura') player.weapons.aura = { level: 1, baseDamage: 4, baseRadius: 100, baseTickRate: 20, timer: 0, isEvolved: false };
            if(id === 'bomb') player.weapons.bomb = { level: 1, baseDamage: 25, baseCooldown: 80, baseSpeed: 8, count: 1, baseAoe: 80, timer: 0, isEvolved: false };
            updateInventoryUI(); calcStats();
        }

        function upgradeWeapon(id) {
            let w = player.weapons[id]; w.level++;
            if(id === 'blaster') { if(w.level===2){w.count=2;} if(w.level===3){w.baseDamage+=5;} if(w.level===4){w.count=3;} if(w.level===5){w.baseDamage+=5;} if(w.level===6){w.baseSpeed+=3;} if(w.level===7){w.baseDamage+=10;} if(w.level===8){w.baseCooldown-=10;} }
            if(id === 'laser') { if(w.level===2){w.baseDamage+=4;} if(w.level===3){w.baseCooldown-=10;} if(w.level===4){w.baseDamage+=4;} if(w.level===5){w.baseSpeed+=2;} if(w.level===6){w.baseCooldown-=10;} if(w.level===7){w.baseDamage+=6;} if(w.level===8){w.baseCooldown-=10;} }
            if(id === 'drone') { if(w.level===2){w.baseDamage+=2;} if(w.level===3){w.count=3;} if(w.level===4){w.baseSpeed+=0.02;} if(w.level===5){w.baseRadius+=20;} if(w.level===6){w.count=4;} if(w.level===7){w.baseDamage+=3;} if(w.level===8){w.count=6;} }
            if(id === 'plasma') { if(w.level===2){w.baseAoe+=15;} if(w.level===3){w.count=4;} if(w.level===4){w.baseDamage+=5;} if(w.level===5){w.baseCooldown-=15;} if(w.level===6){w.count=5;} if(w.level===7){w.baseAoe+=25;} if(w.level===8){w.baseCooldown-=15;} }
            if(id === 'aura') { if(w.level===2){w.baseRadius+=20;} if(w.level===3){w.baseTickRate-=5;} if(w.level===4){w.baseDamage+=2;} if(w.level===5){w.baseRadius+=30;} if(w.level===6){w.baseTickRate-=5;} if(w.level===7){w.baseDamage+=3;} if(w.level===8){w.baseRadius+=40;} }
            if(id === 'bomb') { if(w.level===2){w.baseAoe+=30;} if(w.level===3){w.baseCooldown-=15;} if(w.level===4){w.count=2;} if(w.level===5){w.baseDamage+=10;} if(w.level===6){w.baseAoe+=40;} if(w.level===7){w.count=3;} if(w.level===8){w.baseCooldown-=20;} }
            updateInventoryUI();
        }

        function evolveWeapon(id) {
            let w = player.weapons[id]; w.isEvolved = true;
            if(id === 'blaster') { w.count = 8; w.baseCooldown = 8; w.baseDamage *= 1.5; w.baseSpeed = 30; } 
            if(id === 'laser') { w.baseCooldown = 10; w.baseDamage *= 2.5; w.baseAoe = 100; } 
            if(id === 'drone') { w.count = 12; w.baseSpeed = 0.2; w.baseRadius = 150; w.baseDamage *= 2; } 
            if(id === 'plasma') { w.count = 1; w.baseCooldown = 80; w.baseSpeed = 2; w.baseAoe = 400; w.baseDamage *= 10; } 
            if(id === 'aura') { w.baseTickRate = 5; w.baseRadius = 300; w.baseDamage *= 3; }
            if(id === 'bomb') { w.count = 1; w.baseCooldown = 150; w.baseAoe = 600; w.baseDamage *= 20; }
            updateInventoryUI();
        }

        function acquirePassive(id) { player.passives[id] = { level: 1 }; updateInventoryUI(); calcStats(); }
        function upgradePassive(id) { player.passives[id].level++; updateInventoryUI(); calcStats(); }

        function startGame() {
            hideAllModals();
            const char = CHARACTERS[selectedCharIndex];
            const hpBonus = (saveData.upgrades.hp || 0) * 10;
            const speedBonus = (saveData.upgrades.speed || 0) * 0.5;

            // 🌟 降低初始升級所需經驗，加速前期滾雪球
            player = { 
                size: 16, speed: char.speed + speedBonus, hp: char.hp + hpBonus, maxHp: char.hp + hpBonus, 
                exp: 0, maxExp: 5, level: 1, 
                angle: -Math.PI/2, lastFacingX: 1, lastFacingY: 0, 
                damageFlash: 0, weapons: {}, passives: {}, dashCd: 0, isDashing: false, dashTimer: 0, invincibleTimer: 0 
            };
            
            calcStats(); acquireWeapon(char.weapon); 
            
            worldX = 0; worldY = 0; score = 0; frameCount = 0; gameSeconds = 0; collectedCoins = 0; screenShake = 0; deathTimer = 0;
            enemies = []; bullets = []; gems = []; coinsArr = []; floatTexts = []; particles = []; miniBlackHoles = []; destructibles = []; consumables = []; 
            bossSpawned = false; currentBoss = null; warningTimer = 0;
            
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('exp-fill').style.width = '0%';
            document.getElementById('level-display').innerText = '1'; 
            document.getElementById('score-display').innerText = '0'; 
            document.getElementById('time-display').innerText = '00:00'; 
            dashBtn.classList.remove('cooldown'); dashBtn.innerText = '空間\n摺疊';
            
            updateMenuCoins(); updateInventoryUI();
            gameState = 'playing'; 
        }

        function gameOver() {
            gameState = 'gameover'; document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-over-title').innerText = player.hp <= 0 ? '訊號中斷' : '任務完成';
            document.getElementById('game-over-title').style.color = player.hp <= 0 ? '#e11d48' : '#4ade80';
            document.getElementById('final-level').innerText = player.level; 
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-time').innerText = `${String(Math.floor(gameSeconds / 60)).padStart(2, '0')}:${String(gameSeconds % 60).padStart(2, '0')}`;
            document.getElementById('final-coins').innerText = collectedCoins;
            saveData.coins += collectedCoins; saveGame(); 
            document.getElementById('game-over-modal').classList.remove('hidden');
        }

        function togglePause() { if (gameState === 'playing') { gameState = 'paused'; document.getElementById('pause-modal').classList.remove('hidden'); } }
        function resumeFromPause() { gameState = 'playing'; document.getElementById('pause-modal').classList.add('hidden'); }
        function quitToMenu() { saveData.coins += collectedCoins; saveGame(); backToMainMenu(); }

        let dashRequested = false;
        function triggerDash() { if (player.dashCd <= 0 && gameState === 'playing') dashRequested = true; }

        const stars = []; for (let i = 0; i < 200; i++) stars.push({ x: Math.random() * 3000, y: Math.random() * 3000, size: Math.random() * 1.5 + 0.5, depth: Math.random() * 0.4 + 0.1 });
        const nebulas = []; for(let i = 0; i < 8; i++) nebulas.push({ x: Math.random() * 4000, y: Math.random() * 4000, radius: 400 + Math.random() * 600, hue: Math.random() * 360, depth: 0.02 });

        const keys = {};
        window.addEventListener('keydown', e => { if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) e.preventDefault(); keys[e.code] = true; if (e.code === 'Escape' || e.code === 'KeyP') togglePause(); if (e.code === 'Space') triggerDash(); });
        window.addEventListener('keyup', e => keys[e.code] = false);
        let isTouching = false, joystickOrigin = null, joystickCurrent = null, touchVector = { x: 0, y: 0 };
        canvas.addEventListener('touchstart', e => { if(e.target.closest('button')) return; e.preventDefault(); const touch = e.touches[0]; joystickOrigin = { x: touch.clientX, y: touch.clientY }; joystickCurrent = { x: touch.clientX, y: touch.clientY }; isTouching = true; touchVector = { x: 0, y: 0 }; }, {passive: false});
        canvas.addEventListener('touchmove', e => { if(e.target.closest('button')) return; e.preventDefault(); if (!isTouching || !joystickOrigin) return; const touch = e.touches[0]; joystickCurrent = { x: touch.clientX, y: touch.clientY }; const dist = Math.hypot(joystickCurrent.x - joystickOrigin.x, joystickCurrent.y - joystickOrigin.y); if (dist > 5) { touchVector.x = (joystickCurrent.x - joystickOrigin.x) / dist; touchVector.y = (joystickCurrent.y - joystickOrigin.y) / dist; } }, {passive: false});
        canvas.addEventListener('touchend', e => { if(e.target.closest('button')) return; e.preventDefault(); isTouching = false; joystickOrigin = null; joystickCurrent = null; touchVector = { x: 0, y: 0 }; }, {passive: false});

        function getScreenPos(wx, wy) { return { x: wx - worldX + canvas.width / 2, y: wy - worldY + canvas.height / 2 }; }

        // 🌟 全新波次生成系統：每半秒生成一次，數量無上限狂飆
        function spawnEnemyBatch() {
            if (enemies.length > 600) return; // 提高同畫面怪物上限至 600 隻

            let waveMin = Math.floor(gameSeconds / 60);
            let timeScale = 1 + (waveMin * 0.3);
            
            // 隨著時間，每次生成的怪物數量變多
            let count = 3 + Math.floor(gameSeconds / 20); 
            
            let isSwarm = (gameSeconds % 120 >= 105); // 每 2 分鐘的最後 15 秒觸發怪物潮
            if (isSwarm) count *= 2; 

            let spawnRadius = Math.max(canvas.width, canvas.height) / 2 + 100;
            
            for(let i=0; i<count; i++) {
                let type = 'minion';
                if (waveMin >= 1 && Math.random() < 0.1) type = 'splitter';
                if (gameSeconds > 0 && gameSeconds % 60 === 0 && i === 0) type = 'elite';

                // 稍微提升怪物速度，確保他們能追上玩家
                let size, speed, hpCalc, color, vCount;
                if (type === 'elite') { size = 30 + Math.random()*10; speed = 0.8; hpCalc = 150 * timeScale; color = '#9f1239'; vCount = 4; }
                else if (type === 'splitter') { size = 20 + Math.random()*5; speed = 1.2; hpCalc = 30 * timeScale; color = '#9a3412'; vCount = 6; }
                else { size = 12 + Math.random()*4; speed = (isSwarm ? 1.8 : 1.0) + Math.random()*0.5; hpCalc = (isSwarm ? 2 : 10) * timeScale; color = isSwarm ? '#3b82f6' : '#1e293b'; vCount = 5; }

                const vertices = [];
                for(let v=0; v<vCount; v++) vertices.push({ a: (v/vCount)*Math.PI*2, r: 0.7+Math.random()*0.6 });

                let spawnAngle = Math.random() * Math.PI * 2;
                if (isSwarm) {
                    // Swarm 時怪物會從固定某個方向湧來
                    let swarmAngle = (Math.floor(gameSeconds / 10) % 4) * (Math.PI / 2); 
                    spawnAngle = swarmAngle + (Math.random() - 0.5); 
                }

                let spawnX = worldX + Math.cos(spawnAngle) * spawnRadius;
                let spawnY = worldY + Math.sin(spawnAngle) * spawnRadius;
                
                enemies.push({ type: type, isBoss: false, x: spawnX, y: spawnY, size: size, speed: speed, hp: hpCalc, maxHp: hpCalc, angle: 0, rotSpeed: (Math.random()-0.5)*0.05, vertices: vertices, knockbackX: 0, knockbackY: 0, damageFlash: 0, color: color });
            }
        }

        function spawnDeath() {
            const angle = Math.random() * Math.PI * 2; const spawnRadius = Math.max(canvas.width, canvas.height) / 2 + 200;
            const vertices = []; for(let i=0; i<16; i++){ vertices.push({ a: (i/16) * Math.PI * 2, r: 0.8 + Math.random() * 0.4 }); }
            currentBoss = { type: 'death', isBoss: true, name: '【時空清道夫】', x: worldX + Math.cos(angle) * spawnRadius, y: worldY + Math.sin(angle) * spawnRadius, size: 80, speed: player.speed * 1.5, hp: 9999999, maxHp: 9999999, angle: 0, rotSpeed: 0.2, vertices: vertices, abilityTimer: 0, knockbackX: 0, knockbackY: 0, damageFlash: 0, color: '#000000' };
            enemies.push(currentBoss);
        }

        function spawnParticles(x, y, color, count) {
            for(let i=0; i<count; i++) {
                const angle = Math.random() * Math.PI * 2, speed = Math.random() * 3 + 1;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 15 + Math.random() * 15, maxLife: 30, color: color, size: Math.random() * 3 + 1 });
            }
        }
        
        function spawnDestructible() {
            const angle = Math.random() * Math.PI * 2; 
            const spawnRadius = Math.max(canvas.width, canvas.height) / 2 + 50 + Math.random() * 200;
            destructibles.push({ x: worldX + Math.cos(angle) * spawnRadius, y: worldY + Math.sin(angle) * spawnRadius, size: 20, hp: 1 });
        }

        let chestRewardItem = null;
        function triggerChestAnimation() {
            gameState = 'chest'; 
            const modal = document.getElementById('chest-modal');
            const box = document.getElementById('chest-box');
            const rewardUi = document.getElementById('chest-reward-ui');

                    chestRewardItem = { type: pick.type, id: pick.id, html: `<span class="tag">模組強化</span><h2>${db.icon} ${db.name}</h2><p>等級提升至 Lv.${nextLv}</p>` };

            box.onclick = () => {

                    if(chestRewardItem.type === 'evo') evolveWeapon(chestRewardItem.id);
                    else if(chestRewardItem.type === 'weapon') upgradeWeapon(chestRewardItem.id);
                    else if(chestRewardItem.type === 'passive') upgradePassive(chestRewardItem.id);
                    
                }, 1500);

        function closeChest() { document.getElementById('chest-modal').classList.add('hidden'); gameState = 'playing'; }

        function triggerLevelUp() {
            gameState = 'level_up'; 
            const modal = document.getElementById('level-up-modal');
            const container = document.getElementById('upgrade-options');
            
            modal.classList.remove('hidden'); 
            container.innerHTML = '';
            
            let pool = []; 
            const ownedWeapons = Object.keys(player.weapons); 
            const ownedPassives = Object.keys(player.passives);

            if (ownedWeapons.length < MAX_WEAPONS) { 
                for (let w in WEAPON_DB) { if (!player.weapons[w]) pool.push({ type: 'new_weapon', id: w, name: WEAPON_DB[w].name, icon: WEAPON_DB[w].icon, desc: WEAPON_DB[w].desc[0], tag: '新武裝', class: 'new', action: () => acquireWeapon(w) }); } 
            }
            for (let w in player.weapons) { 
                const lvl = player.weapons[w].level; 
                if (lvl < WEAPON_DB[w].maxLevel && !w.isEvolved) pool.push({ type: 'upgrade', id: w, name: `${WEAPON_DB[w].name} Lv.${lvl+1}`, icon: WEAPON_DB[w].icon, desc: WEAPON_DB[w].desc[lvl], tag: '強化', class: '', action: () => upgradeWeapon(w) }); 
            }

            if (ownedPassives.length < MAX_PASSIVES) { 
                for (let p in PASSIVE_DB) { if (!player.passives[p]) pool.push({ type: 'new_passive', id: p, name: PASSIVE_DB[p].name, icon: PASSIVE_DB[p].icon, desc: PASSIVE_DB[p].desc, tag: '新裝備', class: 'passive', action: () => acquirePassive(p) }); } 
            }
            for (let p in player.passives) { 
                const lvl = player.passives[p].level; 
                if (lvl < PASSIVE_DB[p].maxLevel) pool.push({ type: 'upgrade_passive', id: p, name: `${PASSIVE_DB[p].name} Lv.${lvl+1}`, icon: PASSIVE_DB[p].icon, desc: PASSIVE_DB[p].desc, tag: '強化', class: 'passive', action: () => upgradePassive(p) }); 
            }

            if (pool.length === 0) {
                pool.push({ name: '醫療包', icon: '🍗', desc: '立刻恢復 50 點裝甲', tag: '物資', class: '', action: () => { player.hp = Math.min(player.maxHp, player.hp + 50); } });
                pool.push({ name: '小金庫', icon: '💰', desc: '獲得 25 資料幣', tag: '物資', class: '', action: () => { collectedCoins += 25; document.getElementById('ingame-coin-display').innerText = collectedCoins; } });
            }

            let optionCount = Math.random() < 0.1 ? 4 : 3;
            const choices = pool.sort(() => 0.5 - Math.random()).slice(0, Math.min(optionCount, pool.length));
            
            choices.forEach(choice => {
                const card = document.createElement('div'); card.className = `card ${choice.class==='new' ? 'chest' : ''}`; 
                card.innerHTML = `
                    <div class="card-icon">${choice.icon}</div>
                    <div class="card-content">
                        <h3>${choice.name} <span class="tag ${choice.class}">${choice.tag}</span></h3>
                        <p>${choice.desc}</p>
                    </div>`;
                card.onclick = () => { choice.action(); gameState = 'playing'; modal.classList.add('hidden'); }; 
                container.appendChild(card);
            });
        }

        function checkLevelUp() {
            if (player.exp >= player.maxExp) { 
                player.exp -= player.maxExp; player.level++; 
                
                // 🌟 優化升級經驗曲線
                if (player.level < 10) player.maxExp += 5;
                else if (player.level < 20) player.maxExp += 10;
                else if (player.level < 40) player.maxExp += 15;
                else player.maxExp += 20;
                
                player.maxHp += 2; player.hp = player.maxHp; 
                document.getElementById('level-display').innerText = player.level; 
                
                spawnParticles(worldX, worldY, '#facc15', 50);
                floatTexts.push({x: worldX, y: worldY - 40, text: "LEVEL UP!", life: 60, color: '#facc15'});
                
                enemies.forEach(en => { if (Math.hypot(worldX - en.x, worldY - en.y) < 150 && !en.isBoss && en.type !== 'elite') { en.hp = 0; } });

                triggerLevelUp(); 
            }
            document.getElementById('exp-fill').style.width = Math.min(100, (player.exp / player.maxExp * 100)) + '%';
        }

        function update() {
            if (gameState === 'dying') {
                deathTimer--;
                deathShockwaveRadius += 150; 
                deathFlashAlpha *= 0.7;

                for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life--; particles[i].vx *= 0.95; particles[i].vy *= 0.95; if (particles[i].life <= 0) particles.splice(i, 1); }
                for (let i = floatTexts.length - 1; i >= 0; i--) { floatTexts[i].y -= 0.5; floatTexts[i].life--; if (floatTexts[i].life <= 0) floatTexts.splice(i, 1); }
                enemies.forEach(en => { en.x += Math.cos(en.angle) * en.speed * 0.02; en.y += Math.sin(en.angle) * en.speed * 0.02; });
                if (deathTimer <= 0) gameOver();
                return; 
            }

            frameCount++;
            if (frameCount % 60 === 0) { 
                gameSeconds++; 
                document.getElementById('time-display').innerText = `${String(Math.floor(gameSeconds / 60)).padStart(2, '0')}:${String(gameSeconds % 60).padStart(2, '0')}`;
                document.getElementById('earth-year').innerText = 2084 + gameSeconds;
                if (gameSeconds === 900 && !bossSpawned) { bossSpawned = true; warningTimer = 180; enemies = []; spawnDeath(); }
            }

            if (frameCount % 180 === 0) spawnDestructible();

            if (player.dashCd > 0) {
                player.dashCd--;
                if(player.dashCd === 0) { dashBtn.classList.remove('cooldown'); dashBtn.innerHTML = '空間<br>摺疊'; }
                else { dashBtn.innerText = Math.ceil(player.dashCd/60) + 's'; }
            }
            if (dashRequested && player.dashCd === 0) {
                dashRequested = false; player.isDashing = true; player.dashTimer = 15; player.dashCd = 240; 
                dashBtn.classList.add('cooldown');
                miniBlackHoles.push({ x: worldX, y: worldY, radius: 80, life: 120 });
                screenShake = Math.min(screenShake + 8, 12); 
            }

            // 移除惱人的重力亂拉玩家，僅保留視覺，讓走位回歸純粹的 VS 體驗
            let currentSpeed = player.isDashing ? player.speed * 4.0 : player.speed;
            if (player.isDashing) { player.dashTimer--; if (player.dashTimer <= 0) player.isDashing = false; }

            let dx = 0; let dy = 0;
            if (keys['ArrowUp'] || keys['KeyW']) dy -= 1; if (keys['ArrowDown'] || keys['KeyS']) dy += 1; if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1; if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
            
            let isMoving = dx !== 0 || dy !== 0 || (isTouching && (touchVector.x !== 0 || touchVector.y !== 0));
            if (isMoving) {
                if (dx !== 0 || dy !== 0) {
                    const dist = Math.hypot(dx, dy); 
                    player.lastFacingX = dx / dist; player.lastFacingY = dy / dist;
                    worldX += player.lastFacingX * currentSpeed; worldY += player.lastFacingY * currentSpeed; 
                    player.angle = Math.atan2(dy, dx);
                } else if (isTouching) {
                    player.lastFacingX = touchVector.x; player.lastFacingY = touchVector.y;
                    worldX += player.lastFacingX * currentSpeed; worldY += player.lastFacingY * currentSpeed; 
                    player.angle = Math.atan2(touchVector.y, touchVector.x);
                }
            } else if (player.isDashing) {
                worldX += player.lastFacingX * currentSpeed; worldY += player.lastFacingY * currentSpeed;
            }

            if (player.weapons.blaster) {
                let w = player.weapons.blaster; w.timer++;
                let cd = Math.max(2, Math.floor(w.baseCooldown * globalCdMult)); 
                if (w.timer >= cd) {
                    w.timer = 0; let fDmg = w.baseDamage * globalDmgMult; let fSpeed = w.baseSpeed * globalProjSpeedMult;
                    
                    let baseAngle = Math.atan2(player.lastFacingY, player.lastFacingX);
                    if (w.isEvolved) {
                        for(let i=0; i<w.count; i++) {
                            let ang = baseAngle + (i * Math.PI*2/w.count) + frameCount*0.1; 
                            bullets.push({ type: 'blaster', isEvo: true, x: worldX, y: worldY, vx: Math.cos(ang) * fSpeed, vy: Math.sin(ang) * fSpeed, life: 60, damage: fDmg });
                        }
                    } else {
                        let startAngle = baseAngle - (w.count - 1) * 0.1;
                        for(let i=0; i<w.count; i++) {
                            let ang = startAngle + i * 0.2;
                            bullets.push({ type: 'blaster', x: worldX, y: worldY, vx: Math.cos(ang) * fSpeed, vy: Math.sin(ang) * fSpeed, life: 60, damage: fDmg });
                        }
                    }
                }
            }
            if (player.weapons.laser && enemies.length > 0) {
                let w = player.weapons.laser; w.timer++;
                let cd = Math.max(2, Math.floor(w.baseCooldown * globalCdMult));
                if (w.timer >= cd) {
                    w.timer = 0; let fDmg = w.baseDamage * globalDmgMult; let fSpeed = w.baseSpeed * globalProjSpeedMult;
                    if (w.isEvolved) {
                        for(let i=0; i<2; i++) {
                            if(enemies.length > 0) {
                                let target = enemies[Math.floor(Math.random() * enemies.length)];
                                bullets.push({ type: 'laser_evo', x: target.x, y: target.y, vx: 0, vy: 0, life: 20, damage: fDmg, aoe: w.baseAoe * globalAreaMult });
                            }
                        }
                    } else {
                        let closest = null, minDist = Infinity; enemies.forEach(en => { const dist = Math.hypot(en.x - worldX, en.y - worldY); if (dist < minDist) { minDist = dist; closest = en; } });
                        if (closest && minDist < 800) { const angle = Math.atan2(closest.y - worldY, closest.x - worldX); bullets.push({ type: 'laser', x: worldX, y: worldY, vx: Math.cos(angle) * fSpeed, vy: Math.sin(angle) * fSpeed, life: 60, damage: fDmg }); }
                    }
                }
            }
            if (player.weapons.plasma) {
                let w = player.weapons.plasma; w.timer++;
                let cd = Math.max(10, Math.floor(w.baseCooldown * globalCdMult));
                if (w.timer >= cd) {
                    w.timer = 0; let fDmg = w.baseDamage * globalDmgMult; let fSpeed = w.baseSpeed * globalProjSpeedMult; let fAoe = w.baseAoe * globalAreaMult;
                    if (w.isEvolved) {
                        bullets.push({ type: 'plasma', isEvo: true, x: worldX, y: worldY, vx: Math.cos(player.angle) * fSpeed, vy: Math.sin(player.angle) * fSpeed, life: 300, damage: fDmg, aoe: fAoe });
                    } else {
                        for(let i=0; i<w.count; i++) { let angle = Math.random() * Math.PI * 2; bullets.push({ type: 'plasma', x: worldX, y: worldY, vx: Math.cos(angle) * fSpeed, vy: Math.sin(angle) * fSpeed, life: 60, damage: fDmg, aoe: fAoe }); }
                    }
                }
            }
            if (player.weapons.bomb) {
                let w = player.weapons.bomb; w.timer++;
                let cd = Math.max(20, Math.floor(w.baseCooldown * globalCdMult));
                if (w.timer >= cd) {
                    w.timer = 0; let fDmg = w.baseDamage * globalDmgMult; let fSpeed = w.baseSpeed * globalProjSpeedMult; let fAoe = w.baseAoe * globalAreaMult;
                    if (w.isEvolved) {
                        bullets.push({ type: 'bomb', isEvo: true, x: worldX, y: worldY, vx: Math.cos(player.angle) * fSpeed * 0.5, vy: Math.sin(player.angle) * fSpeed * 0.5, life: 90, damage: fDmg, aoe: fAoe });
                    } else {
                        // 炸彈給予微小引力使其有拋物線感
                        for(let i=0; i<w.count; i++) { let angle = player.angle + (Math.random()-0.5); bullets.push({ type: 'bomb', x: worldX, y: worldY, vx: Math.cos(angle) * fSpeed, vy: Math.sin(angle) * fSpeed, life: 40 + Math.random()*20, damage: fDmg, aoe: fAoe }); }
                    }
                }
            }
            
            const orbitals = [];
            if (player.weapons.drone) { 
                let w = player.weapons.drone; let fSpeed = w.baseSpeed * globalProjSpeedMult; let fRadius = w.baseRadius * globalAreaMult;
                const orbitSpeed = frameCount * fSpeed; 
                for(let i=0; i < w.count; i++) { orbitals.push({ x: worldX + Math.cos(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius, y: worldY + Math.sin(orbitSpeed + (Math.PI * 2 / w.count) * i) * fRadius }); } 
            }

            // 🌟 改變生成節奏，每半秒生成一次大批怪物
            if (gameSeconds < 900) {
                if (frameCount % 30 === 0) spawnEnemyBatch();
            }

            for (let i = bullets.length - 1; i >= 0; i--) { 
                bullets[i].x += bullets[i].vx; bullets[i].y += bullets[i].vy; bullets[i].life--; 
                // 給予未進化的炸彈「往下墜」的物理效果
                if (bullets[i].type === 'bomb' && !bullets[i].isEvo) bullets[i].vy += 0.2; 

                if (bullets[i].type === 'bomb' && bullets[i].life <= 0) {
                    spawnParticles(bullets[i].x, bullets[i].y, bullets[i].isEvo ? '#22c55e' : '#f43f5e', bullets[i].isEvo ? 80 : 30);
                    if(bullets[i].isEvo) screenShake = Math.min(screenShake + 15, 25);
                    enemies.forEach(en => {
                        if (Math.hypot(bullets[i].x - en.x, bullets[i].y - en.y) < bullets[i].aoe) {
                            en.hp -= bullets[i].damage; en.damageFlash = 6; floatTexts.push({x: en.x, y: en.y, text: bullets[i].damage.toFixed(0), life: 20, color: bullets[i].isEvo?'#4ade80':'#f43f5e'});
                        }
                    });
                    bullets.splice(i, 1); continue;
                }
                if (bullets[i].life <= 0) bullets.splice(i, 1); 
            }
            
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].x += particles[i].vx; particles[i].y += particles[i].vy; particles[i].life--; particles[i].vx *= 0.92; particles[i].vy *= 0.92; if (particles[i].life <= 0) particles.splice(i, 1); }
            for (let i = miniBlackHoles.length - 1; i >= 0; i--) { miniBlackHoles[i].life--; if(miniBlackHoles[i].life <= 0) miniBlackHoles.splice(i, 1); }

            for (let i = destructibles.length - 1; i >= 0; i--) {
                let d = destructibles[i]; let isHit = false;

                    ctx.fillStyle = player.damageFlash > 0 ? '#ef4444' : (player.isDashing ? '#a78bfa' : '#e2e8f0'); ctx.strokeStyle = player.damageFlash > 0 ? '#fca5a5' : '#38bdf8'; 
                    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-12, 14); ctx.lineTo(-6, 0); ctx.lineTo(-12, -14); ctx.closePath(); ctx.fill(); ctx.stroke();
                    if(keys['ArrowUp'] || keys['KeyW'] || keys['ArrowDown'] || keys['KeyS'] || keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD'] || isTouching || player.isDashing) { ctx.fillStyle = player.isDashing ? '#d946ef' : '#f97316'; ctx.beginPath(); ctx.moveTo(-7, -4); ctx.lineTo(-18 - Math.random()*(player.isDashing?15:5), 0); ctx.lineTo(-7, 4); ctx.fill(); }
                    ctx.globalAlpha = 1.0; ctx.restore(); 

                    // 畫出拾取範圍與機甲血條
                    ctx.strokeStyle = 'rgba(56, 189, 248, 0.05)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, player.pickupRadius, 0, Math.PI*2); ctx.stroke();
                    const hpPercent = Math.max(0, player.hp / player.maxHp); ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6); ctx.fillStyle = hpPercent > 0.5 ? '#4ade80' : (hpPercent > 0.25 ? '#facc15' : '#ef4444'); ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50 * hpPercent, 6); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.strokeRect(canvas.width / 2 - 25, canvas.height / 2 + 25, 50, 6);

                    if (isTouching && joystickOrigin && joystickCurrent && gameState === 'playing') { ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.beginPath(); ctx.arc(joystickOrigin.x, joystickOrigin.y, 40, 0, Math.PI * 2); ctx.fill(); const dist = Math.hypot(joystickCurrent.x - joystickOrigin.x, joystickCurrent.y - joystickOrigin.y); const renderX = joystickOrigin.x + (dist > 0 ? ((joystickCurrent.x - joystickOrigin.x) / dist) * Math.min(dist, 40) : 0); const renderY = joystickOrigin.y + (dist > 0 ? ((joystickCurrent.y - joystickOrigin.y) / dist) * Math.min(dist, 40) : 0); ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; ctx.beginPath(); ctx.arc(renderX, renderY, 15, 0, Math.PI * 2); ctx.fill(); }
                }

                ctx.font = 'bold 16px monospace'; ctx.textAlign = 'center'; floatTexts.forEach(ft => { const pos = getScreenPos(ft.x, ft.y); ctx.globalAlpha = ft.life / 30; ctx.fillStyle = ft.color || 'white'; ctx.fillText(ft.text, pos.x, pos.y - 15); }); ctx.globalAlpha = 1.0;
            }
            ctx.restore();

            if (gameState === 'dying') {
                ctx.save(); 
                ctx.translate(canvas.width / 2, canvas.height / 2);
                
                ctx.beginPath(); 
                ctx.arc(0, 0, deathShockwaveRadius, 0, Math.PI * 2); 
                ctx.lineWidth = Math.max(1, 40 - deathShockwaveRadius / 25); 
                ctx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0, 1 - deathShockwaveRadius / 1500)})`; 
                ctx.stroke();

                ctx.beginPath(); 
                ctx.arc(0, 0, deathShockwaveRadius * 0.8, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(239, 68, 68, ${Math.max(0, 0.4 - deathShockwaveRadius / 1200)})`; 
                ctx.fill();
                ctx.restore();

                if (deathFlashAlpha > 0.01) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${deathFlashAlpha})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                const fadeAlpha = Math.min(0.8, (15 - deathTimer) / 15);
                ctx.fillStyle = `rgba(159, 18, 57, ${fadeAlpha})`; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if (deathTimer < 10 && Math.random() < 0.6) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.15})`;
                    ctx.fillRect(0, Math.random() * canvas.height, canvas.width, Math.random() * 15 + 2);
                    ctx.fillStyle = `rgba(56, 189, 248, ${Math.random() * 0.2})`;
                    ctx.fillRect(0, Math.random() * canvas.height, canvas.width, Math.random() * 30 + 5);
                }

                const textAlpha = Math.min(1, (15 - deathTimer) / 5);
                ctx.font = '900 48px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let glitchX = 0;
                if (deathTimer < 12 && Math.random() < 0.5) glitchX = (Math.random() - 0.5) * 25;
                
                ctx.fillStyle = `rgba(56, 189, 248, ${textAlpha * 0.7})`; 
                ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX - 4, canvas.height/2 - 50);
                ctx.fillStyle = `rgba(244, 63, 94, ${textAlpha * 0.7})`; 
                ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX + 4, canvas.height/2 - 50);
                
                ctx.fillStyle = `rgba(255, 255, 255, ${textAlpha})`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#e11d48';
                ctx.fillText("CRITICAL DAMAGE", canvas.width/2 + glitchX, canvas.height/2 - 50);
                ctx.shadowBlur = 0;
                
                ctx.font = 'bold 20px monospace';
                ctx.fillStyle = `rgba(148, 163, 184, ${textAlpha})`;
                ctx.fillText(">> CONNECTION LOST <<", canvas.width/2 + glitchX, canvas.height/2);
            }
        }

        function gameLoop() { 
            if (gameState === 'playing' || gameState === 'dying') update(); 
            draw(); 
            requestAnimationFrame(gameLoop); 
        }
        gameLoop();
    </script>
</body>
</html>
